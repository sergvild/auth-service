services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth-server:
    build: .
    container_name: auth-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/authdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      # Generate a proper base64-encoded 256-bit secret for production:
      # openssl rand -base64 32
      JWT_SECRET: Y2hhbmdlLW1lLXRvLWEtcHJvcGVyLXNlY3JldC1pbi1wcm9kdWN0aW9u
      JWT_ACCESS_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
